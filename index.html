<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Instagram'ga o'tish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #16121F;
    --bg-soft: #1E1830;
    --text: #F5F1ED;
    --text-dim: #9B92A8;
    --sun: #FEDA75;
    --rose: #D62976;
    --violet: #4F5BD5;
    --ring-size: min(58vw, 230px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 6vh 28px 5vh;
    position: relative;
  }

  /* Ambient background glow */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 18%, rgba(214,41,118,0.18), transparent 55%),
      radial-gradient(circle at 80% 75%, rgba(79,91,213,0.14), transparent 50%);
    pointer-events: none;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
    z-index: 1;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.1s;
  }

  .stage {
    position: relative;
    width: var(--ring-size);
    height: var(--ring-size);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 90deg, var(--sun), var(--rose), var(--violet), var(--sun));
    opacity: 0;
    animation: spin 9s linear infinite, fadeIn 0.9s ease forwards;
  }

  .ring::after {
    content: "";
    position: absolute;
    inset: 7px;
    border-radius: 50%;
    background: var(--bg);
  }

  .glyph {
    position: relative;
    z-index: 2;
    width: 34%;
    height: 34%;
    border: 2.5px solid var(--text);
    border-radius: 28%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
    animation-delay: 0.5s;
  }

  .glyph::before {
    content: "";
    width: 42%;
    height: 42%;
    border: 2.5px solid var(--text);
    border-radius: 50%;
  }

  .glyph::after {
    content: "";
    position: absolute;
    top: 16%;
    right: 16%;
    width: 7%;
    height: 7%;
    border-radius: 50%;
    background: var(--text);
  }

  .copy {
    text-align: center;
    z-index: 1;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.65s;
  }

  .copy h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(24px, 6vw, 30px);
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }

  .copy p {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text-dim);
    max-width: 280px;
    margin: 0 auto;
  }

  .action {
    width: 100%;
    max-width: 340px;
    z-index: 1;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
    animation-delay: 0.85s;
  }

  .go-btn {
    width: 100%;
    border: none;
    border-radius: 16px;
    padding: 17px 0;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #16121F;
    background: linear-gradient(95deg, var(--sun), var(--rose) 55%, var(--violet));
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .go-btn:active {
    transform: scale(0.97);
    filter: brightness(0.95);
  }

  .meta {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .meta svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .ring { animation: fadeIn 0.9s ease forwards; }
    .eyebrow, .copy, .action, .glyph { animation-duration: 0.01s; }
  }
</style>
</head>
<body>

  <div class="eyebrow">Tezkor kirish</div>

  <div class="stage">
    <div class="ring"></div>
    <div class="glyph"></div>
  </div>

  <div class="copy">
    <h1>Instagram bir bosishda<br>tayyor</h1>
    <p>Telegramdan chiqmasdan, hisobingizga bevosita o'tasiz. Hech narsa saqlanmaydi — bu Instagram'ning o'zi.</p>
  </div>

  <div class="action">
    <button class="go-btn" id="openBtn">Instagram'ni ochish</button>
    <div class="meta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="11" width="14" height="9" rx="2"/>
        <path d="M8 11V7a4 4 0 018 0v4"/>
      </svg>
      Login va parolingiz faqat Instagram'da qoladi
    </div>
  </div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  document.getElementById('openBtn').addEventListener('click', () => {
    const url = 'https://www.instagram.com/';
    if (tg && tg.openLink) {
      tg.openLink(url, { try_instant_view: false });
    } else {
      window.open(url, '_blank');
    }
  });
</script>

</body>
</html>
